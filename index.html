<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>秒数表示アプリ</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: white;
      color: black;
    }

    .status-bar {
      height: 56px;
      padding: 14px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      box-sizing: border-box;
      font-size: 22px;
      font-weight: 700;
    }

    #fake-time {
      letter-spacing: 0.5px;
    }

    .status-icons {
      font-size: 20px;
      font-weight: 700;
    }

    .app {
      padding: 80px 16px;
    }

    h1 {
      font-size: 42px;
      margin: 0 0 50px;
      font-weight: 800;
    }

    #seconds {
      font-size: 24px;
      margin-bottom: 10px;
    }

    button {
      font-size: 16px;
      padding: 6px 18px;
      margin-right: 6px;
      border: none;
      border-radius: 18px;
      background: #eee;
      color: black;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="status-bar">
    <div id="fake-time">00:00:00</div>
    <div class="status-icons">▮▮▮ 4G 🔋68</div>
  </div>

  <div class="app">
    <h1>秒数表示アプリ</h1>

    <div id="seconds">0秒</div>

    <button onclick="startTimer()">開始</button>
    <button onclick="stopTimer()">停止</button>
    <button onclick="resetTimer()">リセット</button>
  </div>

  <script>
    let count = 0;
    let timer = null;

    function updateFakeTime() {
      const now = new Date();

      const hour = String(now.getHours()).padStart(2, "0");
      const minute = String(now.getMinutes()).padStart(2, "0");
      const second = String(now.getSeconds()).padStart(2, "0");

      document.getElementById("fake-time").textContent =
        hour + ":" + minute + ":" + second;
    }

    setInterval(updateFakeTime, 1000);
    updateFakeTime();

    function startTimer() {
      if (timer !== null) return;

      timer = setInterval(function() {
        count++;
        document.getElementById("seconds").textContent = count + "秒";
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timer);
      timer = null;
    }

    function resetTimer() {
      clearInterval(timer);
      timer = null;
      count = 0;
      document.getElementById("seconds").textContent = "0秒";
    }
  </script>

</body>
</html>
